app = "gym-app"

[build]

[deploy]
  release_command = "sh -c 'migrate -path /migrations -database \"${GYM_DATABASE_URL:-$DATABASE_URL}\" up'"

[env]
  PRIMARY_REGION = "dfw"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
