# fly.toml app configuration file generated for gym-app on 2026-03-09T15:00:23-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gym-app'
primary_region = 'iad'

[build]

[deploy]
  release_command = "sh -c 'migrate -path /migrations -database \"${GYM_DATABASE_URL:-$DATABASE_URL}\" up'"

[env]
  PORT = '8080'
  PRIMARY_REGION = 'dfw'

[http_service]
  internal_port = 8080
  force_https = true

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
